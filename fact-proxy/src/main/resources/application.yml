server:
  port: ${PORT:3000}

motoguide:
  proxy-token: ${MOTOGUIDE_PROXY_TOKEN:}
  admin-token: ${MOTOGUIDE_ADMIN_TOKEN:}
  rate-limit-per-minute: ${RATE_LIMIT_PER_MINUTE:30}
  diagnostics-enabled: ${MOTOGUIDE_DIAGNOSTICS_ENABLED:false}
  prompt-overrides-enabled: ${MOTOGUIDE_PROMPT_OVERRIDES_ENABLED:false}
  prompt-overrides-object-url: ${MOTOGUIDE_PROMPT_OVERRIDES_OBJECT_URL:}
  prompt-overrides-refresh-seconds: ${MOTOGUIDE_PROMPT_OVERRIDES_REFRESH_SECONDS:60}
  prompt-overrides-auth-token: ${MOTOGUIDE_PROMPT_OVERRIDES_AUTH_TOKEN:}
  short-fact-prompt: ${MOTOGUIDE_SHORT_FACT_PROMPT:}
  long-fact-prompt: ${MOTOGUIDE_LONG_FACT_PROMPT:}
  eleven-labs-api-key: ${ELEVENLABS_API_KEY:}
  eleven-labs-voice-id: ${ELEVENLABS_VOICE_ID:JBFqnCBsd6RMkjVDRZzb}
  eleven-labs-model-id: ${ELEVENLABS_MODEL_ID:eleven_multilingual_v2}
  eleven-labs-output-format: ${ELEVENLABS_OUTPUT_FORMAT:mp3_44100_128}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  endpoint: https://api.openai.com/v1/chat/completions

spring:
  application:
    name: motoguide-fact-proxy
  jackson:
    deserialization:
      fail-on-unknown-properties: true
