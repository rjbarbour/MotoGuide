openapi: 3.0.3
info:
  title: MotoGuide Fact Proxy API
  version: 0.1.0
  description: |
    MVP contract for the MotoGuide iOS app to request a short or long
    ride-safe place fact without storing or sending an OpenAI API key from
    the device.
servers:
  - url: https://motoguide-fact-proxy.fly.dev
    description: Production Fly.io proxy
  - url: http://127.0.0.1:3000
    description: Local development proxy
tags:
  - name: Health
    description: Proxy health checks.
  - name: Facts
    description: Ride-safe place facts.
  - name: Admin
    description: Operational controls. Not used by the iOS app.
x-deployment:
  provider: Fly.io
  app: motoguide-fact-proxy
  organization: dml
  primaryRegion: lhr
  image: motoguide-fact-proxy:deployment-01KWFY4N628G4137Y7BMQPN6P9
  machines:
    - id: 080d306c727d98
      process: app
      region: lhr
      state: started
      version: 6
    - id: 8ee01dc77de778
      process: app
      region: lhr
      state: started
      version: 6
  publicIngress:
    sharedIpv4: 66.241.125.198
    dedicatedIpv6: "2a09:8280:1::13b:6469:0"
  deployedSecrets:
    - OPENAI_API_KEY
    - MOTOGUIDE_PROXY_TOKEN
  optionalSecrets:
    - MOTOGUIDE_ADMIN_TOKEN
  runtimeConfiguration:
    MOTOGUIDE_DIAGNOSTICS_ENABLED:
      default: false
      description: Enables verbose proxy diagnostics at startup.
    MOTOGUIDE_PROMPT_OVERRIDES_ENABLED:
      default: false
      description: Load optional prompt overrides from Fly object storage URL.
    MOTOGUIDE_PROMPT_OVERRIDES_OBJECT_URL:
      description: Object-store URL containing optional prompt override JSON.
    MOTOGUIDE_PROMPT_OVERRIDES_REFRESH_SECONDS:
      default: 60
      description: How often proxy reloads prompt overrides from object storage.
    MOTOGUIDE_SHORT_FACT_PROMPT:
      default: built-in short fact prompt
      description: Optional server-side prompt override for shortFacts requests. Never sent by iOS.
    MOTOGUIDE_LONG_FACT_PROMPT:
      default: built-in long fact prompt
      description: Optional server-side prompt override for longFacts requests. Never sent by iOS.
    OPENAI_MODEL:
      default: gpt-4o-mini
      description: OpenAI model selected by the Fly runtime environment.
    RATE_LIMIT_PER_MINUTE:
      default: 30
      description: Per-IP request limit for authenticated proxy calls.
x-current-security-model:
  transport: HTTPS through Fly.io public ingress.
  appAuthentication: Shared bearer token in the Authorization header.
  deviceSecretStorage: iOS Keychain generic-password service MotoGuideProxy.
  serverSecretStorage: Fly.io secrets.
  openAiKeyExposure: Server-side only. Never store the OpenAI API key in the iOS app or repository.
  currentLimitations:
    - A leaked MOTOGUIDE_PROXY_TOKEN can call the proxy until rotated or rate-limited.
    - The MVP proxy does not yet bind requests to a specific app install, Apple App Attest key, user, or approved device.
  plannedHardening:
    - Per-device registration.
    - Apple App Attest assertion verification.
    - Server-side device approval, revocation, and quota state.
    - Per-user auth before wider non-TestFlight distribution.
x-observability:
  responseHeaders:
    X-Request-Id: Correlates app requests with Fly proxy logs.
  logPrivacy:
    logsTokens: false
    logsOpenAiKey: false
    logsExactPlaceName: false
    logsRiderCoordinates: false
  events:
    - fact_proxy_request
    - fact_request_valid
    - fact_request_success
    - fact_request_rejected
    - proxy_auth_failed
    - proxy_auth_misconfigured
    - rate_limit_exceeded
    - openai_response
    - openai_upstream_error
    - openai_request_failed
    - diagnostics_updated
    - prompt_overrides_loaded
    - prompt_overrides_load_failed
    - prompt_overrides_load_skipped
  diagnostics:
    baselineRequestLogsAlwaysEnabled: true
    verboseDiagnosticsDefault: false
    startupEnvironmentVariable: MOTOGUIDE_DIAGNOSTICS_ENABLED
    adminEndpoint: /admin/diagnostics
    adminEndpointRequiresSecret: MOTOGUIDE_ADMIN_TOKEN
    adminEndpointHiddenWhenSecretUnset: true
    runtimeChangesAreProcessLocal: true
paths:
  /health:
    get:
      tags:
        - Health
      summary: Check proxy health
      description: Public health check. Does not require bearer authentication.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Proxy is running.
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - ok
  /v1/fact:
    post:
      tags:
        - Facts
      summary: Generate one ride-safe place fact
      description: |
        Validates a place request, calls the server-side LLM provider, sanitizes
        the generated text, and returns one bounded fact. The iOS app sends
        only `factMode`, boundary/place fields, and place hierarchy. It never
        sends prompt text, arbitrary model messages, OpenAI configuration, or
        coordinates. The proxy owns prompt selection for `shortFacts` and
        `longFacts`. The iOS app must fall back to the base place announcement
        for any non-200 response, invalid response body, rejected fact, missing
        token, or request timeout.
      operationId: createPlaceFact
      security:
        - MotoGuideProxyToken: []
      parameters:
        - in: header
          name: X-MotoGuide-User-Id
          description: Optional rider/user identifier for server-side prompt override lookup.
          required: false
          schema:
            type: string
            minLength: 4
            maxLength: 64
      x-ios-keychain-service: MotoGuideProxy
      x-ios-timeout-seconds: 3
      x-ios-fallback: Speak the base place announcement without a fact.
      x-openai-api-key-location: Server-side only. Never store the OpenAI API key in the iOS app or repository.
      x-speech-safety-rules:
        - One sentence.
        - Long Facts may use up to two short sentences.
        - Factual and neutral.
        - Useful as ambient place context.
        - Short enough to keep the total spoken announcement ride-safe.
        - No questions.
        - No invitations, route advice, speed advice, or riding instructions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FactRequest"
            examples:
              town:
                summary: UK town request
                value:
                  boundary: town
                  placeName: Stroud
                  factMode: shortFacts
                  countryContext: United Kingdom
                  placeHierarchy:
                    street: null
                    town: Stroud
                    county: Gloucestershire
                    region: England
                    country: United Kingdom
      responses:
        "200":
          description: One sanitized bounded fact.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactResponse"
              examples:
                fact:
                  value:
                    fact: Known for its wool trade.
        "400":
          description: Invalid JSON, missing required field, invalid boundary, invalid factMode, invalid placeName, or invalid placeHierarchy.
        "401":
          description: Missing or wrong proxy bearer token.
        "415":
          description: Unsupported content type. Proxy only accepts application/json.
        "500":
          description: Proxy is misconfigured, including missing server-side proxy token.
        "502":
          description: OpenAI returned an error or unusable response.
  /admin/diagnostics:
    get:
      tags:
        - Admin
      summary: Read verbose diagnostics state
      description: |
        Operational endpoint. Not used by the iOS app. Requires
        `MOTOGUIDE_ADMIN_TOKEN`. If that token is not configured, this endpoint
        returns 404.
      operationId: getDiagnostics
      security:
        - MotoGuideAdminToken: []
      responses:
        "200":
          description: Current diagnostics state for this proxy process.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"
        "401":
          description: Missing or wrong admin bearer token.
        "404":
          description: Admin diagnostics endpoint is disabled because MOTOGUIDE_ADMIN_TOKEN is not configured.
    put:
      tags:
        - Admin
      summary: Update verbose diagnostics state
      description: |
        Operational endpoint. Not used by the iOS app. Runtime changes are
        process-local; on multi-machine deployments, prefer
        `MOTOGUIDE_DIAGNOSTICS_ENABLED` for a consistent fleet-wide setting.
      operationId: updateDiagnostics
      security:
        - MotoGuideAdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticsRequest"
      responses:
        "200":
          description: Updated diagnostics state for this proxy process.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"
        "401":
          description: Missing or wrong admin bearer token.
        "404":
          description: Admin diagnostics endpoint is disabled because MOTOGUIDE_ADMIN_TOKEN is not configured.
components:
  securitySchemes:
    MotoGuideProxyToken:
      type: http
      scheme: bearer
      bearerFormat: MOTOGUIDE_PROXY_TOKEN
      description: |
        Shared proxy token. The iOS app reads this from the Keychain generic-password
        item with service `MotoGuideProxy`.
    MotoGuideAdminToken:
      type: http
      scheme: bearer
      bearerFormat: MOTOGUIDE_ADMIN_TOKEN
      description: |
        Separate operational token for `/admin/diagnostics`. This token must not
        be shipped in the iOS app.
  schemas:
    Boundary:
      type: string
      description: Boundary type that triggered the announcement.
      enum:
        - country
        - nation
        - county
        - town
        - street
    FactRequest:
      type: object
      additionalProperties: false
      required:
        - boundary
        - placeName
        - factMode
        - placeHierarchy
      properties:
        boundary:
          $ref: "#/components/schemas/Boundary"
        placeName:
          type: string
          minLength: 1
          maxLength: 96
          pattern: "^[A-Za-z0-9 .,'’&()\\-]+$"
          description: Place to generate a fact about.
          example: Stroud
        factMode:
          type: string
          description: |
            Requested fact depth. The proxy validates this field and selects
            the server-side prompt. Unknown values return 400.
          enum:
            - shortFacts
            - longFacts
          example: shortFacts
        countryContext:
          type: string
          nullable: true
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z .,'’()\\-]+$"
          description: Optional country name used to disambiguate reused place names.
          example: United Kingdom
        placeHierarchy:
          $ref: "#/components/schemas/PlaceHierarchy"
    PlaceHierarchy:
      type: object
      additionalProperties: false
      description: |
        Current place hierarchy from iOS reverse geocoding. Values may be null
        when unavailable or invalid. Coordinates are intentionally not part of
        this contract.
      properties:
        street:
          $ref: "#/components/schemas/OptionalPlaceName"
        town:
          $ref: "#/components/schemas/OptionalPlaceName"
        county:
          $ref: "#/components/schemas/OptionalPlaceName"
        region:
          $ref: "#/components/schemas/OptionalPlaceName"
        country:
          allOf:
            - $ref: "#/components/schemas/OptionalCountryName"
    OptionalPlaceName:
      type: string
      nullable: true
      minLength: 1
      maxLength: 96
      pattern: "^[A-Za-z0-9 .,'’&()\\-]+$"
      example: Nailsworth
    OptionalCountryName:
      type: string
      nullable: true
      minLength: 1
      maxLength: 64
      pattern: "^[A-Za-z .,'’()\\-]+$"
      example: United Kingdom
    FactResponse:
      type: object
      additionalProperties: false
      required:
        - fact
      properties:
        fact:
          type: string
          minLength: 1
          maxLength: 280
          description: |
            Sanitized ride-safe fact. shortFacts responses are bounded to 120
            characters; longFacts responses are bounded to 280 characters.
          example: Known for its wool trade.
    DiagnosticsRequest:
      type: object
      additionalProperties: false
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: Whether verbose diagnostics should be enabled for this proxy process.
    DiagnosticsResponse:
      type: object
      additionalProperties: false
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: Whether verbose diagnostics are enabled for this proxy process.
